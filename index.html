<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#244c48" />
    <title>交易魔法師之村</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="game-shell" aria-label="交易魔法師之村">
      <canvas id="game" width="550" height="340" aria-label="交易村遊戲畫面"></canvas>
      <section class="hud" aria-live="polite">
        <div class="identity">
          <div class="avatar"><img src="assets/fire-wizard-walk-0.png" alt="8-bit 火元素交易魔法師角色頭像" /></div>
          <div><small id="player-name">見習生</small><strong id="rank">Lv.0 火之見習生</strong></div>
        </div>
        <div class="progress" title="學徒進度"><span id="progress-fill"></span></div>
        <button id="bag-button" class="round-button bag-button" aria-label="開啟背包">🎒</button>
        <button id="menu-button" class="round-button" aria-label="開啟選單">☰</button>
      </section>
      <div id="edge-hint" class="edge-hint hidden">← 前往灼焰工坊</div>
      <section id="overlay" class="overlay hidden" aria-live="polite"></section>
      <section id="start-screen" class="start-screen">
        <div class="title-mark"><img src="assets/fire-wizard-walk-0.png" alt="火元素交易魔法師" /></div>
        <p class="eyebrow">EMBER WIZARD VILLAGE</p>
        <h1>交易魔法師<br /><em>之村</em></h1>
        <p class="subtitle">掌握風險，駕馭屬於你的烈焰。</p>
        <label>你的冒險者暱稱<input id="name-input" maxlength="12" placeholder="例如：小幣" /></label>
        <button id="start-button" class="primary">踏入熾焰村 <span>→</span></button>
        <p class="controls">WASD / 方向鍵移動　·　E 互動　·　B 背包　·　Esc 選單</p>
        <p class="disclaimer">本遊戲內容僅為教育用途，不構成投資建議。合約交易具高風險，請自行評估。</p>
      </section>
    </main>
    <noscript>這個遊戲需要啟用 JavaScript。</noscript>
    <script type="module" src="app.js"></script>
  </body>
</html>
